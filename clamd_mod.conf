# Enables the clamd_mod engine (services/virus_scan/clamd_mod.conf from
# c-icap-modules), which connects the virus_scan ICAP service to a running
# clamd daemon via its local socket.

Module common clamd_mod.so

# Must match the LocalSocket path set in /etc/clamav/clamd.conf.
clamd_mod.ClamdSocket /run/clamav/clamd.sock
